name: Terraform + Ansible

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID:       ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET:   ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_TENANT_ID:       ${{ secrets.ARM_TENANT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init
        env:
          TF_VAR_subscription_id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          TF_VAR_client_id: ${{ secrets.ARM_CLIENT_ID }}
          TF_VAR_client_secret: ${{ secrets.ARM_CLIENT_SECRET }}
          TF_VAR_tenant_id: ${{ secrets.ARM_TENANT_ID }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}

      - name: Terraform force unlock
        run: terraform force-unlock 6d7b77e6-6f2e-4f92-35c4-76bf70e507a9

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve
        env:
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

          TF_VAR_subscription_id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          TF_VAR_client_id: ${{ secrets.ARM_CLIENT_ID }}
          TF_VAR_client_secret: ${{ secrets.ARM_CLIENT_SECRET }}
          TF_VAR_tenant_id: ${{ secrets.ARM_TENANT_ID }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}

          ARM_USE_CLI: false
      
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y jq netcat-openbsd

      - name: Export Terraform outputs
        working-directory: terraform
        run: |
          echo "CONTROL_PLANE=$(terraform output -raw control_plane_ip)" >> $GITHUB_ENV
          echo "WORKERS=$(terraform output -json worker_ips | jq -r '.[]' | tr '\n' ' ')" >> $GITHUB_ENV

      - name: Generate Ansible inventory
        run: |
          mkdir -p ansible

          cat > ansible/inventory.ini <<EOF
          [control_plane]
          ${CONTROL_PLANE} ansible_user=azureuser

          [workers]
          EOF

          for ip in ${WORKERS}; do
            echo "$ip ansible_user=azureuser" >> ansible/inventory.ini
          done

          cat >> ansible/inventory.ini <<EOF

          [all:children]
          control_plane
          workers
          EOF

      - name: Wait for SSH
        run: |
          for ip in ${CONTROL_PLANE} ${WORKERS}; do
            echo "Waiting SSH on $ip"
            until nc -z $ip 22; do
              sleep 5
            done
          done

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Install Ansible
        run: pip install ansible

      - name: Run Ansible
        working-directory: ansible
        run: |
          export ANSIBLE_HOST_KEY_CHECKING=False
          ansible-playbook -i inventory.ini playbook.yml